<!doctype html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rendelés</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h2>Rendelési űrlap</h2>
    <form>
      <div class="mb-3">
        <label for="name" class="form-label">Név</label>
        <input type="text" class="form-control" id="name" placeholder="Írd be a neved" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="Írd be az email címed" required>
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">Cím</label>
        <input type="text" class="form-control" id="address" placeholder="Írd be a címed" required>
      </div>

      <div class="mb-3">
        <label for="order" class="form-label">Rendelés részletei</label>
        <textarea class="form-control" id="order" rows="3" placeholder="Mit szeretnél rendelni?" required></textarea>
      </div>

      <button type="submit" class="btn btn-success">Rendelés elküldése</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
